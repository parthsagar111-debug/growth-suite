services:
  - type: web
    name: growth-suite
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: N8N_WEBHOOK_FUNNEL
        sync: false
      - key: N8N_WEBHOOK_LIFECYCLE
        sync: false
      - key: N8N_WEBHOOK_EXPERIMENT
        sync: false
      - key: N8N_WEBHOOK_RESULTS
        sync: false
      - key: GROWTH_SUITE_LIVE
        value: "true"
      - key: GROQ_API_KEY
        sync: false
